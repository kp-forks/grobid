project("grobid-core") {
    apply plugin: 'com.gradleup.shadow'
    apply plugin: 'jacoco'

    configurations {
        shadedLib
    }

    dependencies {
        implementation(group: 'xml-apis', name: 'xml-apis') {
            // otherwise xml-apis 2.0.1 will come from XOM and will result in
            // java.lang.ClassNotFoundException: org.w3c.dom.ElementTraversal
            //TODO: sort out this problem better
            version {
                strictly '1.4.01'
            }
        }

        // Logs — slf4j 2.0.x + logback 1.5.x must move together: OpenNLP 2.5.x (and Dropwizard 5) pull
        // slf4j-api 2.0.x, whose ServiceLoader binding (SLF4JServiceProvider) only exists in logback 1.5.x.
        // logback 1.2.x would leave slf4j with no provider (NOP logging) in batch/standalone mode.
        implementation 'org.slf4j:slf4j-api:2.0.17'
        implementation 'ch.qos.logback:logback-classic:1.5.26'

        implementation "org.apache.pdfbox:pdfbox:2.0.36"

        api "xerces:xercesImpl:2.12.2"
        // jsonic has no direct GROBID usage, but the bundled langdetect localLib (the default
        // language detector) needs it at runtime to parse its language profiles. Keep it as a
        // runtime-only dependency rather than exposing it on grobid-core's compile API.
        runtimeOnly "net.arnx:jsonic:1.3.10"
        api "net.sf.saxon:Saxon-HE:9.6.0-9"
        api "xom:xom:1.3.9"
        api 'javax.xml.bind:jaxb-api:2.3.0'

        implementation "joda-time:joda-time:2.14.0"
        implementation "org.apache.lucene:lucene-analyzers-common:4.5.1"
        implementation 'black.ninia:jep:4.3.1'
        implementation 'org.apache.opennlp:opennlp-tools:2.5.9'

        // NOTE: jruby-complete bundles a vulnerable BouncyCastle (CVE-2026-5598) under its gem stdlib,
        // but GROBID only uses jruby for the optional, non-default Pragmatic sentence segmenter, which
        // never invokes Ruby's openssl — so the BC code is never loaded and the CVE is not triggerable.
        // No released jruby ships a fixed BouncyCastle yet (latest bundles 1.83; the fix needs 1.84), so
        // we leave it as-is and wait for an upstream jruby release with BouncyCastle >= 1.84.
        implementation group: 'org.jruby', name: 'jruby-complete', version: '9.4.12.1'

        shadedLib "org.apache.lucene:lucene-analyzers-common:4.5.1"
    }

    jar {
        from {
            project.configurations.runtimeClasspath.collect {
                it.isDirectory() ? [] : localLibs.contains(it.getName()) ? zipTree(it) : []
            }
        }
        exclude("logback.xml")
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    }

    shadowJar {
        archiveClassifier = 'onejar'
        mergeServiceFiles()
        zip64 = true
        manifest {
            attributes 'Main-Class': 'org.grobid.core.main.batch.GrobidMain'
        }
        from sourceSets.main.output

        from {
            project.configurations.runtimeClasspath.collect {
                it.isDirectory() ? [] : localLibs.contains(it.getName()) ? zipTree(it) : []
            }
        }

        configurations = [project.configurations.shadedLib, project.configurations.runtimeClasspath]
        relocate 'org.apache.lucene', 'org.grobid.shaded.org.apache.lucene'
    }

    artifacts {
        archives jar
        archives shadowJar
    }

    processResources {
        inputs.property("gitRevision", rootProject.ext.gitRevision)
        filesMatching(["grobid-version.txt", "grobid-revision.txt"]) {
            expand(
                project_version: project.property('version') ?: "unknown",
                project_revision: rootProject.ext.gitRevision
            )
        }
    }

    tasks.register(
        "install",
        {
            dependsOn publishToMavenLocal
            dependsOn 'shadowJar'
        }
    )
}

