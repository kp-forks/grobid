    apply plugin: 'maven-publish'
    apply plugin: 'org.jetbrains.kotlin.jvm'
    apply plugin: 'com.adarshr.test-logger'
    apply plugin: 'com.diffplug.spotless'

    spotless {
        java {
            target 'src/**/*.java'
            // Exclude files carrying inherited third-party license headers (ASF and
            // Google diff-match-patch) so their required attribution is preserved.
            targetExclude(
                'src/main/java/org/grobid/core/analyzers/ArabicChars.java',
                'src/main/java/org/grobid/core/analyzers/GrobidDefaultAnalyzer.java',
                'src/main/java/org/grobid/core/analyzers/GrobidFilterDeleteSpaceBetweenSameAlphabet.java',
                'src/main/java/org/grobid/core/utilities/matching/DiffMatchPatch.java'
            )
            eclipse().configFile(rootProject.file('eclipse-formatter.xml'))
            removeUnusedImports()
            importOrder('java', 'javax', '', 'org.grobid')
            licenseHeaderFile(rootProject.file('config/license-header.txt'))
            trimTrailingWhitespace()
            endWithNewline()
        }
        kotlin {
            target 'src/**/*.kt'
            ktlint().editorConfigOverride([
                'ktlint_standard_no-wildcard-imports': 'disabled',
                'max_line_length': 'off'
            ])
            licenseHeaderFile(rootProject.file('config/license-header.txt'))
            trimTrailingWhitespace()
            endWithNewline()
        }
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                from components.java
                //artifact jar
                pom {
                    licenses {
                        license {
                            name = 'The Apache License, Version 2.0'
                            url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                        }
                    }
                }
            }
        }
        repositories {
            mavenLocal()
        }
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }

    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            jvmTarget = "21"
        }
    }

    repositories {
        mavenCentral()
        maven {
            url = new File(rootProject.rootDir, "grobid-core/localLibs")
        }
        maven {
            url = "https://jitpack.io"
        }
    }

    configurations {
        all*.exclude group: 'org.slf4j', module: "slf4j-log4j12"
        all*.exclude group: 'log4j', module: "log4j"
        // Mockito as an explicit Java agent (JDK 21+ disallows self-attaching agents by default)
        mockitoAgent
    }

    ext {
        // treating them separately, these jars will be flattened into grobid-core.jar on installing,
        // to avoid missing dependencies from the projects that include grobid-core (see 'jar' task in grobid-core)
        localLibs = ['crfpp-1.0.2.jar',
                     'langdetect-1.1-20120112.jar',
                     'grobid-lucene-analysers-0.0.2.jar',
                     'imageio-pnm-1.0.jar',
                     'wapiti-1.5.0.jar',
                     'blingfire-java-0.2.1.jar']
    }

    dependencies {
        // packaging local libs inside grobid-core.jar
        implementation fileTree(dir: new File(rootProject.rootDir, 'grobid-core/localLibs'), include: localLibs)

        testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine"
        testRuntimeOnly "org.junit.vintage:junit-vintage-engine"
        testImplementation(platform('org.junit:junit-bom:5.14.1'))
        testRuntimeOnly("org.junit.platform:junit-platform-launcher") {
            because("Only needed to run tests in a version of IntelliJ IDEA that bundles older versions")
        }
        testImplementation('org.junit.jupiter:junit-jupiter')
        // JUnit 4 API (run via the vintage engine above). Previously pulled in transitively by
        // powermock-module-junit4; declared explicitly now that PowerMock is removed.
        testImplementation 'junit:junit:4.13.2'
        testImplementation 'org.easymock:easymock:5.6.0'
        testImplementation "org.mockito:mockito-core:5.20.0"
        mockitoAgent("org.mockito:mockito-core:5.20.0") { transitive = false }
        testImplementation "org.xmlunit:xmlunit-matchers:2.10.3"
        testImplementation "org.xmlunit:xmlunit-legacy:2.10.3"
        testImplementation "org.hamcrest:hamcrest-all:1.3"
        testImplementation 'org.jetbrains.kotlin:kotlin-test'

        implementation "com.cybozu.labs:langdetect:1.1-20120112"
        implementation "com.rockymadden.stringmetric:stringmetric-core_2.11:0.27.4"
        implementation "commons-pool:commons-pool:1.6"
        implementation "commons-io:commons-io:2.21.0"
        implementation "org.apache.commons:commons-lang3:3.20.0"
        implementation "org.apache.commons:commons-collections4:4.5.0"
        implementation 'org.apache.commons:commons-text:1.15.0'
        implementation "com.google.guava:guava:33.6.0-jre"
        implementation "org.apache.httpcomponents:httpclient:4.5.14"
        implementation "black.ninia:jep:4.3.1"
        implementation 'com.github.pemistahl:lingua:1.2.2'

        implementation "com.fasterxml.jackson.core:jackson-core:2.21.4"
        implementation "com.fasterxml.jackson.core:jackson-databind:2.21.4"
        implementation "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.21.4"
    }

    tasks.register('sourceJar', Jar) {
        description = 'A jar that contains source code'
        archiveClassifier = 'sources'
        from sourceSets.main.allSource
    }

    artifacts {
        archives sourceJar
        archives jar
    }

    tasks.withType(Test) {
        useJUnitPlatform()

        testLogging.showStandardStreams = true
        // enable for having separate test executor for different tests
        forkEvery = 1
        maxHeapSize = "1024m"

        def javaLibraryPath = getJavaLibraryPath()

        if (JavaVersion.current().compareTo(JavaVersion.VERSION_1_8) > 0) {
            jvmArgs "--add-opens", "java.base/java.util.stream=ALL-UNNAMED",
                "--add-opens", "java.base/java.io=ALL-UNNAMED",
                "--add-opens", "java.xml/jdk.xml.internal=ALL-UNNAMED"
        }

        // Attach Mockito explicitly so its inline mock maker (used for mockStatic) does not
        // rely on self-attaching, which JDK 21+ warns about and will eventually disallow.
        jvmArgs "-javaagent:${configurations.mockitoAgent.asPath}"

        systemProperty "java.library.path", "${javaLibraryPath}"
    }
}

