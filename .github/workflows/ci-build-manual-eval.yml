name: Build and push the Grobid end to end evaluation docker image

on:
  workflow_dispatch:
    inputs:
#      input_tag:
#        type: string
#        description: Tag of the docker image to evaluate
#        required: true
#        default: "latest-full"
      custom_tag:
        type: string
        description: Docker image tag
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: gradle/actions/setup-gradle@v4
    - name: Build with Gradle
      run: ./gradlew build -x test

  docker-build-full:
    needs: [ build ]
    runs-on: ubuntu-latest

    steps:
      - name: Create more disk space
        run: sudo rm -rf /usr/share/dotnet && sudo rm -rf /opt/ghc && sudo rm -rf "/usr/local/share/boost" && sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_LFOPPIANO }}
          password: ${{ secrets.DOCKERHUB_TOKEN_LFOPPIANO }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.evaluation
          push: true
          tags: |
            lfoppiano/grobid-evaluation:latest, lfoppiano/grobid-evaluation:${{ github.event.inputs.custom_tag}}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
