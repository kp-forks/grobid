name: Pull, retag and push Docker image

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: 'Source image repository (e.g. lfoppiano/grobid)'
        required: true
        default: 'lfoppiano/grobid'
      source_tag:
        description: 'Source image tag'
        required: true
        default: 'latest-crf'
      target_image:
        description: 'Target image repository (e.g. grobid/grobid)'
        required: true
        default: 'grobid/grobid'
      target_tag:
        description: 'Target image tag'
        required: true
        default: 'latest-crf'

jobs:
  retag:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy image preserving digest
        env:
          # Credentials are passed via env (not interpolated into the shell
          # script below) so that shell metacharacters in secret values can't
          # break the script and so the values stay masked in logs.
          LFOPPIANO_USER: ${{ secrets.DOCKERHUB_USERNAME_LFOPPIANO }}
          LFOPPIANO_TOKEN: ${{ secrets.DOCKERHUB_TOKEN_LFOPPIANO }}
          GROBID_USER: ${{ secrets.DOCKERHUB_USERNAME_GROBID }}
          GROBID_TOKEN: ${{ secrets.DOCKERHUB_TOKEN_GROBID }}
          SOURCE_IMAGE: ${{ github.event.inputs.source_image }}
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
          TARGET_IMAGE: ${{ github.event.inputs.target_image }}
          TARGET_TAG: ${{ github.event.inputs.target_tag }}
        run: |
          set -euo pipefail

          SRC="${SOURCE_IMAGE}:${SOURCE_TAG}"
          DST="${TARGET_IMAGE}:${TARGET_TAG}"

          # We use `docker buildx imagetools create` instead of pull/tag/push
          # because the former operates at the registry manifest level: it
          # copies the manifest list (and reuses existing blobs via cross-repo
          # mount) so the target digest is identical to the source digest.
          #
          # `docker pull` on a multi-arch image only fetches the runner's
          # native platform, and the subsequent `docker push` would upload a
          # single-arch image with a new digest, silently dropping the arm64
          # variant. `imagetools create` preserves all platforms and digests.
          #
          # Authentication: `imagetools` only needs write access to the
          # target namespace. The source read is handled registry-side via
          # cross-repo mount, so a single login as the target owner is
          # sufficient as long as the source is a public image (or the
          # target credentials also have pull access to the source).

          login_for_target() {
            case "$TARGET_IMAGE" in
              grobid/*)
                if [ -z "${GROBID_USER:-}" ] || [ -z "${GROBID_TOKEN:-}" ]; then
                  echo "::error::Missing DOCKERHUB_USERNAME_GROBID / DOCKERHUB_TOKEN_GROBID secrets for $TARGET_IMAGE"
                  exit 1
                fi
                echo "Logging in as $GROBID_USER (grobid/ namespace)"
                echo "$GROBID_TOKEN" | docker login -u "$GROBID_USER" --password-stdin
                ;;
              lfoppiano/*)
                if [ -z "${LFOPPIANO_USER:-}" ] || [ -z "${LFOPPIANO_TOKEN:-}" ]; then
                  echo "::error::Missing DOCKERHUB_USERNAME_LFOPPIANO / DOCKERHUB_TOKEN_LFOPPIANO secrets for $TARGET_IMAGE"
                  exit 1
                fi
                echo "Logging in as $LFOPPIANO_USER (lfoppiano/ namespace)"
                echo "$LFOPPIANO_TOKEN" | docker login -u "$LFOPPIANO_USER" --password-stdin
                ;;
              *)
                echo "::error::Unsupported target namespace in '$TARGET_IMAGE' (expected grobid/* or lfoppiano/*)"
                exit 1
                ;;
            esac
          }

          login_for_target

          echo "::group::Source manifest ($SRC)"
          docker buildx imagetools inspect "$SRC"
          echo "::endgroup::"

          # Capture source digest before the copy so we can compare it against
          # the destination digest in the job summary. `--format '{{json
          # .Manifest.Digest}}'` returns the top-level manifest-list digest
          # (wrapped in quotes, which we strip).
          SRC_DIGEST=$(docker buildx imagetools inspect "$SRC" --format '{{json .Manifest.Digest}}' | tr -d '"')

          echo "::group::Copying $SRC -> $DST (manifest-level, digest-preserving)"
          docker buildx imagetools create --tag "$DST" "$SRC"
          echo "::endgroup::"

          echo "::group::Target manifest ($DST) — digest should match source"
          docker buildx imagetools inspect "$DST"
          echo "::endgroup::"

          DST_DIGEST=$(docker buildx imagetools inspect "$DST" --format '{{json .Manifest.Digest}}' | tr -d '"')

          if [ "$SRC_DIGEST" = "$DST_DIGEST" ]; then
            DST_DIGEST_NOTE="$DST_DIGEST (preserved)"
          else
            DST_DIGEST_NOTE="$DST_DIGEST (⚠ mismatch)"
            echo "::warning::Destination digest does not match source — multi-arch variants may have been dropped"
          fi

          {
            echo "## 🐳 Docker Image Retagged"
            echo ""
            echo "| Field  | Source | Destination |"
            echo "|--------|--------|-------------|"
            echo "| Image  | \`${SOURCE_IMAGE}\` | \`${TARGET_IMAGE}\` |"
            echo "| Tag    | \`${SOURCE_TAG}\` | \`${TARGET_TAG}\` |"
            echo "| Ref    | \`${SRC}\` | \`${DST}\` |"
            echo "| Digest | \`${SRC_DIGEST}\` | \`${DST_DIGEST_NOTE}\` |"
            echo ""
            echo "**Usage:**"
            echo '```bash'
            echo "docker pull ${DST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          docker logout
