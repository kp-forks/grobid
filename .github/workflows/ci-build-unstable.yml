name: Build unstable

on: [ push ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, ubuntu-24.04-arm, macos-15-intel ]

      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Check code formatting
        run: ./gradlew spotlessCheck
        continue-on-error: false
      - name: Build and test
        run: ./gradlew assemble test jacocoTestReport coveralls --info --stacktrace

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'

      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format: jacoco
          file: build/reports/jacoco/codeCoverageReport/codeCoverageReport.xml
          debug: true

  docker-build-amd64:
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Create more disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Compute GROBID version
        id: version
        run: |
          git fetch --tags --force
          echo "value=$(git describe --tags --always --first-parent)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_LFOPPIANO }}
          password: ${{ secrets.DOCKERHUB_TOKEN_LFOPPIANO }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.crf
          platforms: linux/amd64
          build-args: |
            GROBID_VERSION=${{ steps.version.outputs.value }}
          outputs: type=image,name=lfoppiano/grobid,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max

  docker-build-arm64:
    needs: [build]
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Create more disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Compute GROBID version
        id: version
        run: |
          git fetch --tags --force
          echo "value=$(git describe --tags --always --first-parent)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_LFOPPIANO }}
          password: ${{ secrets.DOCKERHUB_TOKEN_LFOPPIANO }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.crf
          platforms: linux/arm64
          build-args: |
            GROBID_VERSION=${{ steps.version.outputs.value }}
          outputs: type=image,name=lfoppiano/grobid,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max

  docker-merge:
    needs: [docker-build-amd64, docker-build-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_LFOPPIANO }}
          password: ${{ secrets.DOCKERHUB_TOKEN_LFOPPIANO }}
      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t lfoppiano/grobid:latest-develop \
            -t lfoppiano/grobid:latest-crf \
            lfoppiano/grobid@${{ needs.docker-build-amd64.outputs.digest }} \
            lfoppiano/grobid@${{ needs.docker-build-arm64.outputs.digest }}
      - name: Docker Image Summary
        run: |
          {
            echo "## 🐳 Docker Image Uploaded Successfully"
            echo ""
            echo "**Image Details:**"
            echo "- **Registry:** docker.io"
            echo "- **Image:** lfoppiano/grobid"
            echo "- **Type:** CRF-only multi-arch build, auto-published from \`${GITHUB_REF_NAME}\`"
            echo "- **Tags:**"
            echo "  - \`latest-develop\`"
            echo "  - \`latest-crf\`"
            echo "- **Platforms:** linux/amd64, linux/arm64"
            echo ""
            echo "**Usage:**"
            echo '```bash'
            echo "docker pull lfoppiano/grobid:latest-crf"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  hf-space-update:
    needs: [docker-merge]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Trigger HF Space factory reboot
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://huggingface.co/api/spaces/lfoppiano/grobid-dev/restart?factory=true" \
            -H "Authorization: Bearer $HF_TOKEN")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "## HF Space Update" >> $GITHUB_STEP_SUMMARY
            echo "Factory reboot triggered for [lfoppiano/grobid-dev](https://huggingface.co/spaces/lfoppiano/grobid-dev)" >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::Failed to trigger HF Space factory reboot (HTTP $http_code): $body"
            exit 1
          fi
