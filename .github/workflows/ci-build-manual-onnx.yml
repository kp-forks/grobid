name: Build and push an ONNX docker image

# This workflow builds the lightweight ONNX/Wapiti-only Docker image
# (no Python/DeLFT/TensorFlow dependencies)

on:
  push:
    branches:
      - onnx-docker
  workflow_dispatch:
    inputs:
      custom_tag:
        type: string
        description: Docker image tag
        required: true
        default: "latest-onnx"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-tags: true
        fetch-depth: 0
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: gradle/actions/setup-gradle@v4
    - name: Build with Gradle
      run: ./gradlew build -x test

  docker-build-onnx:
    needs: [ build ]
    runs-on: ubuntu-latest

    steps:
      - name: Create more disk space
        run: sudo rm -rf /usr/share/dotnet && sudo rm -rf /opt/ghc && sudo rm -rf "/usr/local/share/boost" && sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
      - name: Compute GROBID version
        id: version
        run: |
          git fetch --tags --force
          echo "value=$(git describe --tags --always --first-parent)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_LFOPPIANO }}
          password: ${{ secrets.DOCKERHUB_TOKEN_LFOPPIANO }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.onnx
          push: true
          build-args: |
            GROBID_VERSION=${{ steps.version.outputs.value }}
          tags: |
            lfoppiano/grobid:latest-onnx, lfoppiano/grobid:${{ github.event.inputs.custom_tag || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
      - name: Docker Image Summary
        env:
          CUSTOM_TAG: ${{ github.event.inputs.custom_tag || github.sha }}
        run: |
          {
            echo "## 🐳 Docker Image Uploaded Successfully"
            echo ""
            echo "**Image Details:**"
            echo "- **Registry:** docker.io"
            echo "- **Image:** lfoppiano/grobid"
            echo "- **Type:** ONNX/Wapiti only (lightweight, no Python/DeLFT)"
            echo "- **Tags:**"
            echo "  - \`latest-onnx\`"
            echo "  - \`${CUSTOM_TAG}\`"
            echo "- **Platforms:** linux/amd64"
            echo ""
            echo "**Features:**"
            echo "- ONNX Runtime for deep learning models (CPU only)"
            echo "- Wapiti CRF for traditional models"
            echo "- No Python, TensorFlow, or DeLFT dependencies"
            echo ""
            echo "**Usage:**"
            echo '```bash'
            echo "docker pull lfoppiano/grobid:latest-onnx"
            echo "docker run -t --rm --init -p 8070:8070 -p 8071:8071 lfoppiano/grobid:latest-onnx"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
